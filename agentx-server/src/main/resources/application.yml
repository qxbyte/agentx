spring:
  application:
    name: agentx
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${AGENTX_DB_URL:jdbc:postgresql://localhost:5432/agentx}
    username: ${AGENTX_DB_USER:agentx}
    password: ${AGENTX_DB_PASSWORD:agentx}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    placeholders:
      vector-dim: ${AGENTX_VECTOR_DIM:1024}
  servlet:
    multipart:
      max-file-size: 50MB
      # 文件夹批量附件上传单请求可含最多 50 个文件
      max-request-size: 200MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  # 可观测接线（设计文档 §10）：Spring AI 内建 Micrometer 指标
  # （gen_ai_client_operation_seconds / gen_ai_client_token_usage_total /
  #   db_vector_client_operation_seconds / execute_tool <name> span）。
  # 对接 OTLP（Grafana/Langfuse 等）时取消注释并配置端点：
  # otlp:
  #   metrics:
  #     export:
  #       url: http://otel-collector:4318/v1/metrics
  #       step: 30s
  # 敏感内容（prompt/completion）默认不导出，按需开启：
  # spring.ai.chat.observations.log-prompt / log-completion

agentx:
  chat:
    # 单用户并发流式对话上限（信号量），防止一个账号开大量长连接拖垮模型调用
    max-concurrent-streams-per-user: ${AGENTX_MAX_STREAMS_PER_USER:3}
    # 敏感词基线拦截（逗号分隔）：命中用户输入即拒绝，不进模型。留空即不拦截
    sensitive-words: ${AGENTX_SENSITIVE_WORDS:}
  rag:
    storage-dir: ${AGENTX_RAG_STORAGE:${user.home}/.agentx/uploads}
    vector-dimensions: ${AGENTX_VECTOR_DIM:1024}
  jwt:
    secret: ${AGENTX_JWT_SECRET:dev-only-secret-change-in-prod-0123456789}
    access-ttl: 2h
    refresh-ttl: 7d
  crypto:
    master-key: ${AGENTX_MASTER_KEY:}
  files:
    # 模型生成文件（generateDocument/generateSpreadsheet）的受管存储目录
    storage-dir: ${AGENTX_FILES_STORAGE:${user.home}/.agentx/generated}
    # PDF 中文字体（TTF/OTF 单文件路径）；缺省时自动探测系统 CJK 字体
    pdf-font: ${AGENTX_PDF_FONT:}
  coding:
    # 「新建空白项目」的落盘根目录：空白项目统一建在此目录下并 git init
    projects-root: ${AGENTX_PROJECTS_ROOT:${user.home}/.agentx/projects}
  skills:
    # Skill 斜杠命令目录（对标 Claude Code / Codex 本地目录化配置）：
    # <root>/<name>.md 或 <root>/<name>/SKILL.md，手动增删改文件即时生效
    root: ${AGENTX_SKILLS_ROOT:${user.home}/.agentx/skills}
  plugins:
    # 插件目录（对齐 Claude Code ~/.claude/plugins 布局）：
    # marketplaces/ + cache/<marketplace>/<plugin>/<version>/ + 两个注册 json
    root: ${AGENTX_PLUGINS_ROOT:${user.home}/.agentx/plugins}
