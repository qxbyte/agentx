spring:
  application:
    name: agentx
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${AGENTX_DB_URL:jdbc:postgresql://localhost:5432/agentx}
    username: ${AGENTX_DB_USER:agentx}
    password: ${AGENTX_DB_PASSWORD:agentx}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

agentx:
  jwt:
    secret: ${AGENTX_JWT_SECRET:dev-only-secret-change-in-prod-0123456789}
    access-ttl: 2h
    refresh-ttl: 7d
  crypto:
    master-key: ${AGENTX_MASTER_KEY:}
