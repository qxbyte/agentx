services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${AGENTX_DB_USER:-agentx}
      POSTGRES_PASSWORD: ${AGENTX_DB_PASSWORD:-agentx}
      POSTGRES_DB: agentx
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGENTX_DB_USER:-agentx} -d agentx"]
      interval: 5s
      retries: 10

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTX_DB_URL: jdbc:postgresql://postgres:5432/agentx
      AGENTX_DB_USER: ${AGENTX_DB_USER:-agentx}
      AGENTX_DB_PASSWORD: ${AGENTX_DB_PASSWORD:-agentx}
      AGENTX_JWT_SECRET: ${AGENTX_JWT_SECRET:?required}
      AGENTX_MASTER_KEY: ${AGENTX_MASTER_KEY:?required}
      AGENTX_ADMIN_PASSWORD: ${AGENTX_ADMIN_PASSWORD:-admin123}
      AGENTX_VECTOR_DIM: ${AGENTX_VECTOR_DIM:-1024}
      AGENTX_RAG_STORAGE: /data/uploads
    volumes:
      - uploads:/data/uploads
    ports:
      - "8080:8080"

  web:
    build:
      context: ./agentx-web
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "80:80"

  # MCP server 模板（演示用，生产按需拆独立部署）
  mcp-server:
    build:
      context: .
      dockerfile: agentx-mcp-server/Dockerfile
    ports:
      - "8090:8090"

volumes:
  pgdata:
  uploads:
